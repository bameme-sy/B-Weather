<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B'Weather - Carte Météo</title>
    <link rel="stylesheet" href="other.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>
    <header>
        <div class="menu-toggle" onclick="toggleMenu()">&#9776;</div>
        <ul class="menu">
            <li><a href="index.html">Accueil</a></li>
            <li><a href="weather.html">Climat</a></li>
            <li><a href="map.html">Carte du monde</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </header>

    <main class="map-wrapper">
        <div id="map"></div>
    </main>

    <footer>
        <div class="footer-container">
            <div class="footer-logo">B'Weather</div>
            <div class="footer-links">
                <a href="index.html">Accueil</a>
                <a href="contact.html">À propos</a>
                <a href="contact.html">Contact</a>
            </div>
            <div class="footer-socials">
                <a href="https://www.facebook.com/profile.php?id=61571144656440" title="Facebook"><i class="fab fa-facebook-f"></i></a>
                <a href="https://www.tiktok.com/@btechrise" title="Tiktok"><i class="fab fa-tiktok"></i></a>
                <a href="https://www.instagram.com/bsoyffipro/" title="Instagram"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
        <div class="footer-bottom">&copy; 2025 B'Weather. Tous droits réservés.</div>
    </footer>

    <script>
        function toggleMenu() {
            document.querySelector(".menu").classList.toggle("active");
        }

        const map = L.map('map', {
            center: [48.8566, 2.3522],
            zoom: 5,
            zoomControl: false,
        });

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        const apiKey = '786357c2f6750d1047835cd0efdc5f95';

        const cloudLayer = L.tileLayer(`https://tile.openweathermap.org/map/clouds_new/{z}/{x}/{y}.png?appid=${apiKey}`);
        const precipitationLayer = L.tileLayer(`https://tile.openweathermap.org/map/precipitation_new/{z}/{x}/{y}.png?appid=${apiKey}`);
        const windLayer = L.tileLayer(`https://tile.openweathermap.org/map/wind_new/{z}/{x}/{y}.png?appid=${apiKey}`);
        const temperatureLayer = L.tileLayer(`https://tile.openweathermap.org/map/temp_new/{z}/{x}/{y}.png?appid=${apiKey}`);

        const marker = L.marker([48.8566, 2.3522]).addTo(map);
        marker.bindPopup("<b>Paris</b><br>Point de départ météo").openPopup();

        const overlays = {
            "Nuages": cloudLayer,
            "Précipitations": precipitationLayer,
            "Vent": windLayer,
            "Température": temperatureLayer
        };

        L.control.layers(null, overlays, {
            collapsed: false,
            position: 'topright'
        }).addTo(map);

        L.control.zoom({
            position: 'topright'
        }).addTo(map);

        map.locate({ setView: true, maxZoom: 10 });

        map.on('locationfound', function (event) {
            L.marker(event.latlng).addTo(map).bindPopup("Vous êtes ici !");
        });
    </script>
</body>
</html>
